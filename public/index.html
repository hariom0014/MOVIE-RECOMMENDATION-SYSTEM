<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MOVIE RECOMMENDATION SYSTEM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f5c518;--red:#c0392b;--bg:#0a0a0f;--surface:#111118;
  --card:#16161f;--border:#252535;--text:#e8e8f0;--muted:#6a6a8a;--accent:#ff6b35;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(10,10,15,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.hdr{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:1.2rem;padding:0 1.5rem;height:66px}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);cursor:pointer;flex-shrink:0;white-space:nowrap;user-select:none}
.logo em{color:var(--red);font-style:italic}
.sw{position:relative;flex:1;max-width:660px}
.sbox{display:flex;background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .2s}
.sbox:focus-within{border-color:var(--gold)}
.stype{background:rgba(255,255,255,.04);border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:.68rem;padding:0 .85rem;cursor:pointer;min-width:80px;outline:none;transition:color .2s}
.stype:focus{color:var(--gold)}
#si{flex:1;border:none;background:transparent;color:var(--text);padding:.8rem .9rem;font-family:'DM Sans',sans-serif;font-size:.97rem;outline:none}
#si::placeholder{color:var(--muted)}
.sbtn{background:var(--gold);border:none;color:#000;padding:0 1.2rem;font-size:1rem;cursor:pointer;font-weight:700;transition:background .15s}
.sbtn:hover{background:#e6b200}

/* SUGGESTIONS */
.sugbox{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:400;box-shadow:0 24px 60px rgba(0,0,0,.75);display:none}
.si{display:flex;align-items:center;gap:.7rem;padding:.6rem .9rem;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
.si:last-child{border-bottom:none}
.si:hover{background:rgba(255,255,255,.04)}
.si-img{width:32px;height:46px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--border)}
.si-ph{width:32px;height:46px;border-radius:4px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.si-name{font-weight:600;font-size:.86rem}
.si-meta{font-size:.7rem;color:var(--muted);margin-top:1px}
.si-score{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--gold);margin-left:auto;flex-shrink:0}

/* HERO */
.hero{min-height:66vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 80% 60% at 65% 40%,rgba(192,57,43,.14),transparent 70%),
             radial-gradient(ellipse 60% 50% at 15% 80%,rgba(245,197,24,.07),transparent 60%),var(--bg)}
.hgrid{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 54px,rgba(255,255,255,.013) 54px,rgba(255,255,255,.013) 55px),repeating-linear-gradient(90deg,transparent,transparent 54px,rgba(255,255,255,.013) 54px,rgba(255,255,255,.013) 55px)}
.hc{position:relative;z-index:1;padding:2rem 1rem;max-width:680px;margin:0 auto}
.hbadge{display:inline-flex;align-items:center;gap:.4rem;font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.14em;color:var(--gold);border:1px solid rgba(245,197,24,.3);padding:.32rem .85rem;border-radius:100px;margin-bottom:1.4rem}
.htitle{font-family:'Playfair Display',serif;font-size:clamp(2.3rem,7vw,5rem);font-weight:700;line-height:1.06;background:linear-gradient(140deg,#fff 30%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.9rem}
.hsub{color:var(--muted);font-size:1.02rem;line-height:1.65;margin-bottom:2.2rem}
.hstats{display:flex;gap:1.1rem;justify-content:center;flex-wrap:wrap}
.sp{padding:.65rem 1.3rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;text-align:center}
.sn{font-family:'Space Mono',monospace;font-size:1.35rem;color:var(--gold)}
.sl{font-size:.7rem;color:var(--muted);margin-top:2px}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:2.2rem 1.5rem}
.sec{font-family:'Playfair Display',serif;font-size:1.45rem;margin-bottom:1.1rem}
.sec em{color:var(--gold);font-style:italic}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.8rem;overflow-x:auto;gap:0}
.tab{padding:.65rem 1.3rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.86rem;white-space:nowrap;margin-bottom:-1px;transition:all .2s}
.tab.on,.tab:hover{color:var(--gold);border-bottom-color:var(--gold)}
.tcnt{color:var(--muted);font-size:.72em;margin-left:.2rem}

/* FILTERS */
.frow{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.6rem;align-items:center}
.flbl{font-family:'Space Mono',monospace;font-size:.66rem;color:var(--muted);letter-spacing:.08em;margin-right:.2rem}
.chip{padding:.32rem .85rem;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--muted);font-size:.76rem;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif}
.chip:hover,.chip.on{border-color:var(--gold);color:var(--gold);background:rgba(245,197,24,.07)}

/* SORT ROW */
.srow{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem;flex-wrap:wrap;gap:.7rem}
.rinfo{font-family:'Space Mono',monospace;font-size:.73rem;color:var(--muted)}
.rinfo b{color:var(--gold)}
.sortsel{background:var(--card);border:1px solid var(--border);color:var(--text);padding:.42rem .9rem;border-radius:8px;font-family:'DM Sans',sans-serif;cursor:pointer;font-size:.83rem}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(182px,1fr));gap:1.05rem}

/* CARD */
.card{background:var(--card);border-radius:13px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform .22s,border-color .22s,box-shadow .22s}
.card:hover{transform:translateY(-5px) scale(1.016);border-color:rgba(245,197,24,.45);box-shadow:0 16px 48px rgba(0,0,0,.55)}
.cimgw{position:relative;aspect-ratio:2/3;overflow:hidden;background:var(--surface)}
.cimg{width:100%;height:100%;object-fit:cover;transition:transform .35s;display:block}
.card:hover .cimg{transform:scale(1.06)}
.cnimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.8rem;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.cov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.88),transparent 55%);opacity:0;transition:opacity .22s;display:flex;align-items:flex-end;padding:.8rem}
.card:hover .cov{opacity:1}
.cvbtn{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:.48rem;font-weight:700;font-size:.78rem;cursor:pointer}
.cbody{padding:.75rem}
.ctitle{font-weight:600;font-size:.86rem;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;justify-content:space-between;align-items:center;margin-top:.45rem}
.cyr{font-size:.7rem;color:var(--muted)}
.crat{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gold)}
.cgenres{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.4rem}
.cg{font-size:.6rem;padding:.16rem .44rem;background:rgba(255,255,255,.06);border-radius:4px;color:var(--muted)}

/* SCROLL ROW */
.srow2{display:flex;gap:.9rem;overflow-x:auto;padding-bottom:.7rem}
.srow2::-webkit-scrollbar{height:3px}
.srow2::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.srow2 .card{min-width:172px;max-width:172px}

/* EMPTY */
.empty{text-align:center;padding:3.5rem 2rem;color:var(--muted)}
.empty .ico{font-size:3rem;margin-bottom:.9rem}
.empty h3{color:var(--text);font-size:1.05rem;margin-bottom:.35rem}

/* ── MODAL ── */
.mwrap{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:flex-start;justify-content:center;padding:1.5rem;overflow-y:auto}
.mwrap.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--border);border-radius:20px;max-width:860px;width:100%;margin:auto;position:relative;animation:popIn .26s ease}
@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mclose{position:absolute;top:1rem;right:1rem;width:34px;height:34px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:var(--text);cursor:pointer;font-size:1.05rem;z-index:5;transition:background .2s;display:flex;align-items:center;justify-content:center}
.mclose:hover{background:var(--red)}
.mtop{display:flex;gap:1.6rem;padding:1.8rem;align-items:flex-start}
.mposter{width:200px;flex-shrink:0;border-radius:12px;overflow:hidden;box-shadow:0 18px 52px rgba(0,0,0,.65)}
.mposter img{width:100%;display:block}
.mnoposter{width:200px;aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;flex-shrink:0}
.mright{flex:1;min-width:0}
.mtitle{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1.2;margin-bottom:.7rem}
.badges{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem}
.badge{padding:.26rem .72rem;border-radius:6px;font-size:.7rem;font-weight:600;font-family:'Space Mono',monospace}
.br{background:rgba(245,197,24,.12);color:var(--gold);border:1px solid rgba(245,197,24,.28)}
.by{background:rgba(255,255,255,.06);color:var(--muted)}
.ba{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.28)}
.bp{background:rgba(255,107,53,.12);color:var(--accent);border:1px solid rgba(255,107,53,.28)}
.gtags{display:flex;gap:.38rem;flex-wrap:wrap;margin-bottom:1.1rem}
.gt{padding:.26rem .68rem;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:20px;font-size:.76rem}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.2rem}
.dlbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:.22rem}
.dval{font-size:.86rem;line-height:1.5}
.bobar{margin-bottom:1.2rem}
.bolbls{display:flex;justify-content:space-between;font-size:.73rem;color:var(--muted);margin-bottom:.32rem}
.botrack{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bofill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:3px;transition:width .85s ease}

/* TRAILER BUTTON & EMBED */
.mactions{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.2rem}
.tbtn{display:inline-flex;align-items:center;gap:.45rem;background:var(--gold);color:#000;border:none;border-radius:10px;padding:.68rem 1.3rem;font-weight:700;font-size:.86rem;cursor:pointer;transition:background .15s;white-space:nowrap}
.tbtn:hover{background:#e6b200}
.tbtn.playing{background:#e74c3c;color:#fff}
.tbtn.playing:hover{background:#c0392b}
.sshr{display:inline-flex;align-items:center;gap:.45rem;background:rgba(255,255,255,.07);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:.68rem 1.3rem;font-weight:600;font-size:.86rem;cursor:pointer;transition:all .2s}
.sshr:hover{border-color:var(--gold);color:var(--gold)}

/* TRAILER PLAYER (inside modal, full width below top section) */
.tplayer{display:none;width:100%;background:#000;position:relative}
.tplayer.show{display:block}
.tplayer iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
.tpclose{position:absolute;top:.5rem;right:.5rem;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.2);color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .15s}
.tpclose:hover{background:var(--red)}

/* SONGS */
.songs{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:.85rem;margin:0 1.8rem 1.3rem}
.slbl{font-size:.64rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:.6rem}
.schips{display:flex;flex-wrap:wrap;gap:.36rem}
.sc{padding:.26rem .68rem;background:rgba(245,197,24,.07);border:1px solid rgba(245,197,24,.2);border-radius:20px;font-size:.76rem}

/* RECS */
.mrecs{padding:0 1.8rem 1.8rem;border-top:1px solid var(--border);padding-top:1.4rem}
.mrecs h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:.9rem}

/* HIGHLIGHT */
mark{background:rgba(245,197,24,.28);color:var(--text);border-radius:3px;padding:0 2px}

@media(max-width:680px){.mtop{flex-direction:column}.mposter,.mnoposter{width:140px}.dgrid{grid-template-columns:1fr}.grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}}
@media(max-width:460px){.stype{display:none}.hdr{gap:.7rem}}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="logo" onclick="goHome()">MOVIE<em> RECOMMENDATION </em>SYSTEM</div>
    <div class="sw">
      <div class="sbox">
        <select class="stype" id="stype">
          <option value="all">All</option>
          <option value="movie">Movie</option>
          <option value="actor">Actor</option>
          <option value="singer">Singer</option>
          <option value="song">Song</option>
          <option value="director">Director</option>
        </select>
        <input id="si" type="text" placeholder="Search movies, actors, singers, songs…" autocomplete="off" spellcheck="false">
        <button class="sbtn" onclick="doSearch()">🔍</button>
      </div>
      <div class="sugbox" id="sugbox"></div>
    </div>
  </div>
</header>

<!-- HOME -->
<div id="homeView">
  <div class="hero">
    <div class="hgrid"></div>
    <div class="hc">
      <div class="hbadge">✦ Bollywood Universe</div>
      <h1 class="htitle">Find Every<br>Reel &amp; Song</h1>
      <p class="hsub">Search by movie, actor, singer, director or song. Full details, posters &amp; trailers inside.</p>
      <div class="hstats">
        <div class="sp"><div class="sn">236</div><div class="sl">Movies</div></div>
        <div class="sp"><div class="sn" id="avgR">—</div><div class="sl">Avg IMDb</div></div>
        <div class="sp"><div class="sn">2014–23</div><div class="sl">Years</div></div>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="sec" style="margin-bottom:1rem">Top <em>Rated</em></div>
    <div class="srow2" id="rTop"></div>
    <div class="sec" style="margin-top:2.4rem;margin-bottom:1rem">Box Office <em>Blockbusters</em></div>
    <div class="srow2" id="rBox"></div>
    <div class="sec" style="margin-top:2.4rem;margin-bottom:1rem">Latest <em>Releases</em></div>
    <div class="srow2" id="rNew"></div>
  </div>
</div>

<!-- SEARCH VIEW -->
<div id="searchView" style="display:none">
  <div class="main">
    <div class="tabs" id="tabBar"></div>
    <div class="frow" id="genreRow"></div>
    <div class="srow">
      <div class="rinfo" id="rinfo"></div>
      <select class="sortsel" id="sortSel" onchange="renderResults()">
        <option value="rating">↓ IMDb Rating</option>
        <option value="year">↓ Year (Newest)</option>
        <option value="az">A → Z</option>
        <option value="box">↓ Box Office</option>
      </select>
    </div>
    <div id="grid"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mwrap" id="mwrap" onclick="bgClose(event)">
  <div class="mbox" id="mbox">
    <button class="mclose" onclick="closeModal()">✕</button>
    <div id="mbody"></div>
  </div>
</div>

// ── GENRES ──
const ALL_GENRES = (() => {
  const s = new Set();
  MOVIES.forEach(m => m.genres.split(',').forEach(g => { const t=g.trim(); if(t) s.add(t); }));
  return [...s].sort();
})();

// ── INIT ──
const avgR = (MOVIES.reduce((a,m)=>a+m.rating,0)/MOVIES.length).toFixed(1);
document.getElementById('avgR').textContent = avgR + '★';
buildGenreChips();
fillRow('rTop', [...MOVIES].sort((a,b)=>b.rating-a.rating).slice(0,16));
fillRow('rBox', [...MOVIES].sort((a,b)=>b.box_office-a.box_office).slice(0,16));
fillRow('rNew', [...MOVIES].sort((a,b)=>b.year-a.year||b.rating-a.rating).slice(0,16));

function buildGenreChips(){
  document.getElementById('genreRow').innerHTML =
    '<span class="flbl">GENRE</span>' +
    '<button class="chip on" onclick="pickGenre(this,\'\')">All</button>' +
    ALL_GENRES.map(g=>`<button class="chip" onclick="pickGenre(this,'${E(g)}')">${E(g)}</button>`).join('');
}

// ── SEARCH STATE ──
let curResults = [];
let curGenre   = '';
let sugTimer   = null;

// ── INPUT EVENTS ──
document.getElementById('si').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });
document.getElementById('si').addEventListener('input',   e => {
  clearTimeout(sugTimer);
  const q = e.target.value.trim();
  if(q.length < 2){ hideSug(); return; }
  sugTimer = setTimeout(()=>showSug(q), 180);
});
document.addEventListener('click', e => { if(!e.target.closest('.sw')) hideSug(); });
document.addEventListener('keydown', e => {
  if(e.key==='Escape') closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){ e.preventDefault(); document.getElementById('si').focus(); }
});

// ── SEARCH ──
function doSearch(){
  const q = document.getElementById('si').value.trim();
  hideSug();
  if(!q){ goHome(); return; }
  const type = document.getElementById('stype').value;
  curResults = search(q, type);
  showSV(q, type);
}

function search(q, type){
  const lo = q.toLowerCase();
  return MOVIES.filter(m => {
    if(type==='movie')    return m.title.toLowerCase().includes(lo);
    if(type==='actor')    return m.actors.toLowerCase().includes(lo);
    if(type==='singer')   return m.singers.toLowerCase().includes(lo);
    if(type==='song')     return m.songs.toLowerCase().includes(lo);
    if(type==='director') return m.director.toLowerCase().includes(lo);
    return m.title.toLowerCase().includes(lo)||m.actors.toLowerCase().includes(lo)||
           m.singers.toLowerCase().includes(lo)||m.songs.toLowerCase().includes(lo)||
           m.director.toLowerCase().includes(lo);
  });
}

function showSug(q){
  const hits = search(q, document.getElementById('stype').value).slice(0,7);
  if(!hits.length){ hideSug(); return; }
  document.getElementById('sugbox').innerHTML = hits.map(m=>`
    <div class="si" onclick="openMovie(${m.id})">
      ${m.poster
        ? `<img class="si-img" src="${E(m.poster)}" loading="lazy" onerror="this.style.display='none'">`
        : `<div class="si-ph">🎬</div>`}
      <div style="flex:1;min-width:0">
        <div class="si-name">${hl(E(m.title),q)}</div>
        <div class="si-meta">${m.year} · ${m.genres.split(',').slice(0,2).join(', ').trim()}</div>
      </div>
      <span class="si-score">⭐${m.rating}</span>
    </div>`).join('');
  document.getElementById('sugbox').style.display='block';
}
function hideSug(){ document.getElementById('sugbox').style.display='none'; }

function hl(text, q){
  if(!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<mark>$1</mark>');
}

// ── VIEWS ──
function goHome(){
  document.getElementById('homeView').style.display='block';
  document.getElementById('searchView').style.display='none';
  document.getElementById('si').value='';
  curGenre='';
}
function showSV(q, type){
  document.getElementById('homeView').style.display='none';
  document.getElementById('searchView').style.display='block';
  buildTabs(q, type);
  renderResults();
}

function buildTabs(q, type){
  const types=['all','movie','actor','singer','song','director'];
  const labels={all:'All',movie:'Movie',actor:'Actor',singer:'Singer',song:'Song',director:'Director'};
  document.getElementById('tabBar').innerHTML = types.map(t=>{
    const cnt = search(q, t).length;
    return `<button class="tab${t===type?' on':''}" onclick="switchType('${t}')">${labels[t]}<span class="tcnt">${cnt}</span></button>`;
  }).join('');
}

function switchType(type){
  const q = document.getElementById('si').value.trim();
  document.getElementById('stype').value = type;
  curResults = search(q, type);
  buildTabs(q, type);
  renderResults();
}

function pickGenre(el, g){
  document.querySelectorAll('#genreRow .chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  curGenre = g;
  renderResults();
}

function renderResults(){
  let list = curGenre
    ? curResults.filter(m=>m.genres.toLowerCase().includes(curGenre.toLowerCase()))
    : curResults;
  const sort = document.getElementById('sortSel').value;
  if(sort==='rating') list=[...list].sort((a,b)=>b.rating-a.rating);
  else if(sort==='year') list=[...list].sort((a,b)=>b.year-a.year||b.rating-a.rating);
  else if(sort==='az')   list=[...list].sort((a,b)=>a.title.localeCompare(b.title));
  else if(sort==='box')  list=[...list].sort((a,b)=>b.box_office-a.box_office);
  const q = document.getElementById('si').value.trim();
  document.getElementById('rinfo').innerHTML = `<b>${list.length}</b> result${list.length!==1?'s':''} for <b>"${E(q)}"</b>`;
  document.getElementById('grid').innerHTML = list.length
    ? `<div class="grid">${list.map(cardHTML).join('')}</div>`
    : `<div class="empty"><div class="ico">🎭</div><h3>No results found</h3><p>Try a different term or filter</p></div>`;
}

// ── CARD ──
function cardHTML(m){
  const gs = m.genres.split(',').slice(0,2).map(g=>`<span class="cg">${E(g.trim())}</span>`).join('');
  return `<div class="card" onclick="openMovie(${m.id})">
    <div class="cimgw">
      ${m.poster?`<img class="cimg" src="${E(m.poster)}" alt="${E(m.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:``}
      <div class="cnimg" ${m.poster?"style='display:none'":""}>🎬</div>
      <div class="cov"><button class="cvbtn">▶ View Details</button></div>
    </div>
    <div class="cbody">
      <div class="ctitle">${E(m.title)}</div>
      <div class="cfoot"><span class="cyr">${m.year||'—'}</span><span class="crat">⭐${m.rating||'?'}</span></div>
      <div class="cgenres">${gs}</div>
    </div>
  </div>`;
}

function fillRow(id, movies){
  document.getElementById(id).innerHTML = movies.map(cardHTML).join('');
}

// ── MODAL ──
// Store current movie id so trailer button can reference it
let currentMovieId = null;

function openMovie(id){
  currentMovieId = id;
  const m = MOVIES.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('mbody').innerHTML = buildModal(m);
  document.getElementById('mwrap').classList.add('open');
  document.body.style.overflow='hidden';
}

function buildModal(m){
  const songs = m.songs.split(',').map(s=>s.trim()).filter(Boolean);
  const genres = m.genres.split(',').map(g=>`<span class="gt">${E(g.trim())}</span>`).join('');
  const roi = m.budget>0 ? Math.min((m.box_office/(m.budget*6))*100,100).toFixed(0) : 0;
  const myG = m.genres.split(',').map(g=>g.trim().toLowerCase());
  const recs = MOVIES.filter(x=>x.id!==m.id&&x.genres.split(',').some(g=>myG.includes(g.trim().toLowerCase()))).sort((a,b)=>b.rating-a.rating).slice(0,10);

  return `
  <div class="mtop">
    ${m.poster
      ? `<div class="mposter"><img src="${E(m.poster)}" alt="${E(m.title)}" onerror="this.parentElement.outerHTML='<div class=mnoposter>🎬</div>'"></div>`
      : `<div class="mnoposter">🎬</div>`}
    <div class="mright">
      <div class="mtitle">${E(m.title)}</div>
      <div class="badges">
        <span class="badge br">⭐ ${m.rating} IMDb</span>
        <span class="badge by">📅 ${m.year}</span>
        ${m.age?`<span class="badge ba">🔞 ${E(m.age)}</span>`:''}
        ${m.platform?`<span class="badge bp">▶ ${E(m.platform)}</span>`:''}
      </div>
      <div class="gtags">${genres}</div>
      <div class="dgrid">
        <div><div class="dlbl">Director</div><div class="dval">${E(m.director)||'—'}</div></div>
        <div><div class="dlbl">Music</div><div class="dval">${E(m.composer)||'—'}</div></div>
        <div><div class="dlbl">Cast</div><div class="dval">${E(m.actors)||'—'}</div></div>
        <div><div class="dlbl">Singers</div><div class="dval">${E(m.singers)||'—'}</div></div>
      </div>
      ${m.budget>0?`<div class="bobar"><div class="bolbls"><span>Budget ₹${m.budget}Cr</span><span>Box Office ₹${m.box_office}Cr</span></div><div class="botrack"><div class="bofill" style="width:${roi}%"></div></div></div>`:''}
      <div class="mactions">
        ${m.trailer ? `<button class="tbtn" id="trailerBtn" onclick="playTrailer()">▶ Watch Trailer</button>` : ''}
        <button class="sshr" onclick="copyLink()">↗ Share</button>
      </div>
    </div>
  </div>

  <!-- TRAILER PLAYER: sits below the top section, full width -->
  ${m.trailer ? `
  <div class="tplayer" id="tplayer">
    <button class="tpclose" onclick="stopTrailer()">✕</button>
    <iframe id="tframe" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
  </div>` : ''}

  ${songs.length ? `
  <div class="songs">
    <div class="slbl">🎵 Songs in this Film</div>
    <div class="schips">${songs.map(s=>`<span class="sc">${E(s)}</span>`).join('')}</div>
  </div>` : ''}

  ${recs.length ? `
  <div class="mrecs">
    <h3>You Might Also Like</h3>
    <div class="srow2">${recs.map(cardHTML).join('')}</div>
  </div>` : ''}`;
}

// ── TRAILER LOGIC ──
// Gets the YouTube embed URL from any YouTube link format
function toEmbed(url){
  if(!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if(m) return 'https://www.youtube.com/embed/' + m[1] + '?autoplay=1&rel=0&modestbranding=1';
  return url;
}

function playTrailer(){
  const m = MOVIES.find(x => x.id === currentMovieId);
  if(!m || !m.trailer) return;
  const player = document.getElementById('tplayer');
  const frame  = document.getElementById('tframe');
  const btn    = document.getElementById('trailerBtn');
  if(!player || !frame) return;

  if(player.classList.contains('show')){
    // already playing → stop
    stopTrailer();
  } else {
    frame.src = toEmbed(m.trailer);
    player.classList.add('show');
    btn.textContent = '⏹ Stop Trailer';
    btn.classList.add('playing');
    // scroll player into view
    player.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }
}

function stopTrailer(){
  const player = document.getElementById('tplayer');
  const frame  = document.getElementById('tframe');
  const btn    = document.getElementById('trailerBtn');
  if(frame)  frame.src = '';
  if(player) player.classList.remove('show');
  if(btn)  { btn.textContent = '▶ Watch Trailer'; btn.classList.remove('playing'); }
}

function closeModal(){
  stopTrailer();
  document.getElementById('mwrap').classList.remove('open');
  document.body.style.overflow='';
  currentMovieId = null;
}
function bgClose(e){ if(e.target===document.getElementById('mwrap')) closeModal(); }

function copyLink(){
  navigator.clipboard && navigator.clipboard.writeText(window.location.href);
}

// ── UTIL ──
function E(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
